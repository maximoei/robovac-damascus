send_raw_dps:
  name: Send Raw DPS
  description: >
    Send a raw value to any DPS (Data Point Status) code on the device. Use
    this for advanced control of DPS codes not yet modelled by the integration,
    or for debugging. The value is forwarded verbatim — no encoding is applied.
    Base64-encoded protobuf strings, plain strings, or integers are all
    accepted as values, matching whatever the DPS code expects.
  target:
    entity:
      domain: vacuum
      integration: robovac
  fields:
    dps:
      name: DPS Code
      description: Integer DPS code to write (e.g. 152 for mode control).
      required: true
      example: "152"
      selector:
        number:
          min: 1
          mode: box
    value:
      name: Value
      description: >
        Value to send for the DPS code. Strings (including base64-encoded
        protobuf payloads) and numbers are both accepted.
      required: true
      example: "\"AggG\""
      selector:
        text:

start_room_clean:
  name: Start Room Clean
  description: >
    Clean specific rooms by ID on protobuf-based models (T2277 and compatible).
    Room IDs must match the map stored on the device. Use customize: true to
    apply the per-room fan speed and sweep count already configured in the eufy
    app (SelectRoomsClean CUSTOMIZE mode). The vacuum must be docked or idle.
  target:
    entity:
      domain: vacuum
      integration: robovac
  fields:
    room_ids:
      name: Room IDs
      description: >
        List of room IDs to clean, as integers assigned by the vacuum's internal
        map. Example: [1, 2] cleans rooms 1 and 2.
      required: true
      example: "[1, 2]"
      selector:
        object:
    clean_times:
      name: Clean Times
      description: Number of cleaning passes per room (1–3).
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 3
          mode: box
    map_id:
      name: Map ID
      description: >
        Internal map identifier stored on the device. Leave at 0 to use the
        currently active map (recommended for most users).
      required: false
      default: 0
      selector:
        number:
          min: 0
          mode: box
    releases:
      name: Map Releases
      description: >
        Map version correction number. Leave at 0 unless you know the specific
        map version to target.
      required: false
      default: 0
      selector:
        number:
          min: 0
          mode: box
    customize:
      name: Customize
      description: >
        When enabled, uses the per-room custom settings already stored on the
        device map via the eufy app (fan speed, clean type, sweep count per
        room). When disabled, all selected rooms are cleaned with the global
        settings from DPS 154 and the clean_times value above.
      required: false
      default: false
      selector:
        boolean:
